<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Goals GlutenFree">
<meta name="theme-color" content="#2E1F12">
<title>Goals GlutenFree</title>
<style>
:root{--org:#C4622D;--drk:#2E1F12;--crm:#FDFAF5;--bdr:#EDE0D0;--txt:#3D2B1F;--mut:#8A7A6A;--grn:#4A7A3A;--blu:#2A5A9A;--obl:#FAEADA;--obg:#FFF4EE;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#2E1F12;font-family:system-ui,-apple-system,sans-serif}
#app{display:flex;flex-direction:column;height:100%;background:var(--crm);color:var(--txt)}
.hdr{background:linear-gradient(135deg,#2E1F12,#4A2E18);padding:calc(var(--st) + 12px) 16px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hic{width:38px;height:38px;border-radius:50%;background:rgba(196,98,45,0.35);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.htl{color:#F5E6C8;font-size:17px;font-weight:700}.hsu{color:#C4A882;font-size:10px;margin-top:1px}.hri{margin-left:auto;text-align:right;color:#C4A882;font-size:10px;line-height:1.6}
.nav{display:flex;background:#1A0C04;border-top:3px solid var(--org);flex-shrink:0;padding-bottom:var(--sb)}
.nb{flex:1;border:none;background:transparent;color:#A08060;font-size:8px;font-weight:600;padding:7px 1px 5px;cursor:pointer;line-height:1.4;font-family:inherit}
.nb.on{background:var(--org);color:#fff;font-weight:700}
.ni{display:block;font-style:normal;font-size:16px;line-height:1.3}
.scr{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.pad{padding:14px}
.card{background:#fff;border:1.5px solid var(--bdr);border-radius:12px;padding:13px 15px;margin-bottom:10px}
input,textarea,select{width:100%;padding:11px 12px;border:1.5px solid #E0D0BE;border-radius:10px;font-family:inherit;font-size:15px;background:#FEFCF9;color:var(--txt);outline:none;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--org);box-shadow:0 0 0 3px rgba(196,98,45,0.1)}
textarea{resize:vertical}
.lbl{font-size:11px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:5px}
.btp{background:var(--org);color:#fff;border:none;border-radius:10px;padding:13px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;width:100%}
.btg{background:var(--grn);color:#fff;border:none;border-radius:10px;padding:13px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;width:100%}
.bts{border:none;border-radius:8px;padding:7px 12px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
.fab{position:fixed;bottom:calc(var(--sb) + 76px);right:16px;background:var(--org);color:#fff;border:none;border-radius:26px;padding:13px 18px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(196,98,45,0.45);z-index:50;font-family:inherit}
.fabg{background:var(--grn);box-shadow:0 4px 16px rgba(74,122,58,0.45)}
.tag{background:var(--obl);color:var(--org);font-size:11px;padding:2px 9px;border-radius:16px;font-weight:700;display:inline-block}
.ov{position:fixed;inset:0;background:rgba(20,8,0,0.65);z-index:200;display:flex;align-items:flex-end}
.mod{background:var(--crm);border-radius:20px 20px 0 0;padding:20px 16px calc(var(--sb) + 22px);width:100%;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.xb{background:none;border:none;font-size:26px;color:#A08060;cursor:pointer;line-height:1;padding:0 2px;font-family:inherit}
.sub{display:flex;gap:8px;margin-bottom:14px}
.sbtn{flex:1;padding:9px;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
.sbtn.on{background:var(--obg);color:var(--org);border:2px solid var(--org)}
.sbtn.off{background:#fff;color:#7A6A5A;border:1.5px solid #E0D0BE}
.dh{background:linear-gradient(90deg,#3D2010,#5A3018);padding:8px 13px;border-radius:10px 10px 0 0}
.mg{padding:9px 11px;display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ml{font-size:10px;color:#A08060;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:3px}
.ms{border:1.5px dashed #CCC;border-radius:9px;padding:7px 9px;min-height:48px;cursor:pointer;display:flex;flex-direction:column;justify-content:center}
.ms.fl{border-style:solid;border-color:#E0C0A0;background:var(--obg)}
.chkrow{display:flex;align-items:center;gap:11px;padding:11px 13px;cursor:pointer;border-bottom:1px solid #F0E8DC}
.chkrow:last-child{border-bottom:none}
.chkrow.dn{opacity:0.4}
.chkbox{width:21px;height:21px;border-radius:6px;border:1.5px solid #D0C0A8;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chkbox.on{background:var(--org);border-color:var(--org)}
.pb{background:#e0d8d0;border-radius:8px;height:7px;overflow:hidden;margin-bottom:14px}
.pf{background:var(--org);height:100%;border-radius:8px;transition:width 0.3s}
.ctab{display:flex;flex-direction:column;height:100%}
.ca{flex:1;overflow-y:auto;padding:13px 13px 8px;-webkit-overflow-scrolling:touch}
.msg{display:flex;margin-bottom:9px}
.mgu{justify-content:flex-end}
.av{width:27px;height:27px;border-radius:50%;background:var(--org);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-right:7px;align-self:flex-end}
.bub{max-width:80%;padding:9px 13px;font-size:14px;line-height:1.6;white-space:pre-wrap;border-radius:4px 16px 16px 16px;background:#fff;color:var(--txt);border:1.5px solid var(--bdr)}
.bubu{border-radius:16px 16px 4px 16px;background:var(--org);color:#fff;border:none}
.cir{padding:9px 13px calc(var(--sb) + 9px);border-top:1.5px solid var(--bdr);background:var(--crm);display:flex;gap:7px;flex-shrink:0}
.cin{flex:1;padding:10px 13px;border:1.5px solid #E0D0BE;border-radius:20px;font-size:14px;background:#fff;font-family:inherit}
.csnd{background:var(--org);color:#fff;border:none;border-radius:20px;padding:10px 16px;font-size:17px;cursor:pointer;flex-shrink:0}
.emp{text-align:center;padding:48px 20px;color:var(--mut)}
.aib{background:linear-gradient(135deg,var(--obl),#F5E8D5);border-radius:12px;padding:13px 15px;margin-bottom:14px;border:1.5px solid #E8C8A8}
.ib{background:var(--obg);border:1.5px solid #F0D0B8;border-radius:11px;padding:13px 15px;display:flex;gap:11px;align-items:flex-start;margin-bottom:12px}
.mw{border-radius:11px;overflow:hidden;border:1.5px solid var(--bdr);margin-top:9px}
.mw iframe{display:block;width:100%;border:none}
.pi{padding:12px 13px;border:1.5px solid var(--bdr);border-radius:11px;margin-bottom:7px;cursor:pointer;background:#fff;overflow:hidden}
.pi:active{border-color:var(--org);background:var(--obg)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#D4C4B0;border-radius:4px}
</style>
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100%">Cargando...</div></div>
<script>
var LS={
  get:function(k){try{var v=localStorage.getItem('ggf3_'+k);return v?JSON.parse(v):null;}catch(e){return null;}},
  set:function(k,v){try{localStorage.setItem('ggf3_'+k,JSON.stringify(v));}catch(e){}}
};
var sheetUrl=LS.get('sheetUrl')||'';
function sheetSet(k,v){if(!sheetUrl)return;fetch(sheetUrl,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({key:k,value:v})}).catch(function(){});}
function sheetSync(){
  if(!sheetUrl)return;
  fetch(sheetUrl+'?t='+Date.now()).then(function(r){return r.json();}).then(function(d){
    if(!d.ok)return;
    var m=d.data||{};
    if(m.recipes)state.recipes=Array.isArray(m.recipes)?m.recipes:Object.values(m.recipes);
    if(m.places)state.places=Array.isArray(m.places)?m.places:Object.values(m.places);
    if(m.week&&Object.keys(m.week).length)state.week=m.week;
    if(m.shopping&&Array.isArray(m.shopping))state.shopping=m.shopping;
    if(m.checked)state.checked=m.checked;
    if(m.chatMsgs){var msgs=Array.isArray(m.chatMsgs)?m.chatMsgs:Object.values(m.chatMsgs);if(msgs.length>1)state.chatMsgs=msgs;}
    state.synced=true;render();
  }).catch(function(){});
}
setInterval(function(){if(sheetUrl&&document.visibilityState==='visible')sheetSync();},15000);

function aiCall(msgs,sys,web){
  var k=LS.get('apikey')||'';
  if(!k)return Promise.reject(new Error('nokey'));
  var body={model:'claude-sonnet-4-20250514',max_tokens:1000,messages:msgs};
  if(sys)body.system=sys;
  if(web)body.tools=[{type:'web_search_20250305',name:'web_search'}];
  return fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify(body)
  }).then(function(r){return r.json();}).then(function(d){
    if(d.error)throw new Error(d.error.message);
    return d.content.filter(function(x){return x.type==='text';}).map(function(x){return x.text;}).join('\n');
  });
}

function aiRaw(body){
  var k=LS.get('apikey')||'';
  if(!k)return Promise.reject(new Error('nokey'));
  return fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify(body)
  }).then(function(r){return r.json();}).then(function(d){
    if(d.error)throw new Error(d.error.message);
    return d.content.filter(function(x){return x.type==='text';}).map(function(x){return x.text;}).join('\n');
  });
}

function doScanSteps(b64,mime,onStep){
  onStep('step1');
  var identBody={model:'claude-sonnet-4-20250514',max_tokens:200,messages:[{role:'user',content:[
    {type:'image',source:{type:'base64',media_type:mime||'image/jpeg',data:b64}},
    {type:'text',text:'Identifica el nombre exacto del producto y la marca en esta etiqueta. Responde SOLO con JSON sin ningun otro texto: {"nombre":"nombre del producto","marca":"marca"}'}
  ]}]};
  return aiRaw(identBody).then(function(t){
    var c=t.replace(/```[\w]*/g,'').replace(/```/g,'').trim();
    var prod=JSON.parse(c.slice(c.indexOf('{'),c.lastIndexOf('}')+1));
    onStep('step2',prod);
    var searchBody={model:'claude-sonnet-4-20250514',max_tokens:800,
      tools:[{type:'web_search_20250305',name:'web_search'}],
      messages:[{role:'user',content:'Busca en internet si el producto "'+prod.nombre+'" de la marca "'+prod.marca+'" es APTO PARA CELIACOS en Argentina. Necesito saber: 1) Si tiene certificacion o logo SIN TACC oficial. 2) Si esta en el registro de ANMAT o ACSA como apto. 3) Si hay riesgo de contaminacion cruzada con gluten en la fabrica. 4) Si la marca garantiza proceso libre de gluten. Busca en sitios argentinos, ACSA, ANMAT y foros de celiacos.'}]
    };
    return aiRaw(searchBody).then(function(searchResult){
      onStep('step3');
      var verdictBody={model:'claude-sonnet-4-20250514',max_tokens:600,messages:[
        {role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mime||'image/jpeg',data:b64}},
          {type:'text',text:'Producto: '+prod.nombre+' ('+prod.marca+')\n\nInformacion encontrada en internet:\n'+searchResult+'\n\nDa un veredicto definitivo para celiacos argentinos usando EXACTAMENTE este formato:\n\nVEREDICTO: [APTO SIN TACC / NO APTO / CONSULTAR]\nPRODUCTO: [nombre y marca]\nCERTIFICACION: [descripcion de si tiene logo/certificacion sin TACC o no]\nINGREDIENTES: [que se ve en la etiqueta respecto a TACC]\nCONTAMINACION CRUZADA: [si la fabrica procesa otros con gluten - esto es clave]\nCONCLUSION: [2-3 oraciones explicando el veredicto final, siendo muy especifico sobre si es seguro para celiacos]'}
        ]}
      ]};
      return aiRaw(verdictBody);
    });
  });
}

var DAYS=['Lunes','Martes','Miercoles','Jueves','Viernes','Sabado','Domingo'];
var DNAMES={Lunes:'Lunes',Martes:'Martes',Miercoles:'Mi\u00e9rcoles',Jueves:'Jueves',Viernes:'Viernes',Sabado:'S\u00e1bado',Domingo:'Domingo'};
var MEALS=['Desayuno','Almuerzo','Merienda','Cena'];
var PTYPES=['Restaurante','Panaderia','Heladeria','Pizzeria','Cafeteria','Dietetica','Supermercado','Otro'];
var PNAMES={Panaderia:'Panader\u00eda',Heladeria:'Helader\u00eda',Pizzeria:'Pizzer\u00eda',Cafeteria:'Cafeter\u00eda',Dietetica:'Diet\u00e9tica'};
var CATS=['Todas','Desayuno','Almuerzo/Cena','Merienda','Postre','Sin lactosa','R\u00e1pida','Otra'];
var QQ=['\u00bfEl almid\u00f3n de ma\u00edz tiene TACC?','\u00bfPuedo comer avena?','\u00bfC\u00f3mo evito la contaminaci\u00f3n cruzada?','\u00bfQu\u00e9 marcas de fideos son aptas?'];

function emptyWeek(){var w={};DAYS.forEach(function(d){w[d]={};MEALS.forEach(function(m){w[d][m]=null;});});return w;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dom(u){try{return u.replace(/https?:\/\//,'').split('/')[0];}catch(e){return u;}}
function stars(n,max){max=max||5;var s='';for(var i=0;i<max;i++)s+='<span style="color:'+(i<n?'#C4622D':'#DDD')+'">&#9733;</span>';return s;}
function countMenu(){var n=0;DAYS.forEach(function(d){MEALS.forEach(function(m){if(state.week&&state.week[d]&&state.week[d][m])n++;});});return n;}
function msrc(q){return 'https://maps.google.com/maps?q='+encodeURIComponent(q)+'&output=embed&hl=es';}
function omaps(q){window.open('https://www.google.com/maps/search/'+encodeURIComponent(q),'_blank');}
function pname(t){return PNAMES[t]||t;}
function dname(d){return DNAMES[d]||d;}
function resizeImage(file,maxPx,cb){
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var w=img.width,h=img.height,scale=Math.min(1,maxPx/Math.max(w,h));
      var canvas=document.createElement('canvas');
      canvas.width=Math.round(w*scale);canvas.height=Math.round(h*scale);
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      cb(canvas.toDataURL('image/jpeg',0.75));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

var state={
  tab:'menu',mv:'planner',synced:false,
  recipes:LS.get('recipes')||[],
  places:LS.get('places')||[],
  week:LS.get('week')||emptyWeek(),
  shopping:LS.get('shopping')||[],
  checked:LS.get('checked')||{},
  chatMsgs:LS.get('chat')||[{role:'assistant',content:'Hola! Soy tu asistente de celiaqu\u00eda \uD83C\uDF3E\n\nPreguntame sobre ingredientes con TACC, contaminaci\u00f3n cruzada, marcas aptas en Argentina, y m\u00e1s.'}],
  recos:[],
  er:null,ep:null,smf:null,pk:null,pks:'',
  rs:'',rcat:'Todas',ps:'',rz:'',
  rloading:false,sloading:false,cloading:false,
  scanImg:null,scanMime:null,scanResult:null,scanLoading:false,scanStep:'step1',scanProd:null,
  _rf:null
};
function save(k,v){LS.set(k,v);sheetSet(k,v);}

function render(){
  document.getElementById('app').innerHTML=hdr()+'<div class="scr" id="scr">'+renderTab()+'</div>'+renderNav();
  bind();
  if(state.tab==='ia'){var ca=document.getElementById('ca');if(ca)ca.scrollTop=ca.scrollHeight;}
}

function hdr(){
  return '<div class="hdr">'+
    '<div class="hic">&#127919;</div>'+
    '<div><div class="htl">Goals GlutenFree</div>'+
    '<div class="hsu">Tu app de celiaqu\u00eda'+(sheetUrl?' &bull; Sheets':'')+
    (state.synced?' <span style="color:#80D090;font-size:9px">&#10003; sync</span>':'')+
    '</div></div>'+
    '<div class="hri">'+state.recipes.length+' recetas<br>'+state.places.length+' lugares</div>'+
    '</div>';
}
function renderNav(){
  var tabs=[['menu','&#128197;','Men\u00fa'],['recetas','&#127829;','Recetas'],['lugares','&#128205;','Lugares'],['explorar','&#128506;','Explorar'],['scanner','&#128247;','Esc\u00e1ner'],['ia','&#10024;','IA']];
  var h='<nav class="nav">';
  tabs.forEach(function(t){h+='<button class="nb'+(state.tab===t[0]?' on':'')+'" data-t="'+t[0]+'"><i class="ni">'+t[1]+'</i>'+t[2]+'</button>';});
  return h+'</nav>';
}
function renderTab(){
  try{
    if(state.tab==='menu')return renderMenu();
    if(state.tab==='recetas')return renderRecetas();
    if(state.tab==='lugares')return renderLugares();
    if(state.tab==='explorar')return renderExplorar();
    if(state.tab==='scanner')return renderScanner();
    if(state.tab==='ia')return renderIA();
  }catch(e){return '<div class="pad" style="color:red;padding:20px">Error: '+esc(e.message)+'</div>';}
  return '';
}

function renderMenu(){
  var mc=countMenu();
  return '<div class="pad">'+
    '<div class="sub">'+
    '<button class="sbtn'+(state.mv==='planner'?' on':' off')+'" id="vp">&#128197; Planificador</button>'+
    '<button class="sbtn'+(state.mv==='shopping'?' on':' off')+'" id="vs">&#128722; Lista de compras</button>'+
    '</div>'+
    (state.mv==='planner'?renderPlanner(mc):renderShopping())+
    '</div>';
}
function renderPlanner(mc){
  var h='';
  if(!state.recipes.length)h+='<div class="ib"><span style="font-size:20px">&#128161;</span><p style="font-size:13px;color:#7A4A2A;line-height:1.5">Primero guard\u00e1 recetas en <b>Recetas</b> para armar el men\u00fa</p></div>';
  DAYS.forEach(function(d){
    h+='<div class="card" style="padding:0;overflow:hidden;margin-bottom:11px">'+
       '<div class="dh"><div style="color:#F5E6C8;font-size:13px;font-weight:700">'+dname(d)+'</div></div>'+
       '<div class="mg">';
    MEALS.forEach(function(m){
      var r=state.week&&state.week[d]?state.week[d][m]:null;
      h+='<div><div class="ml">'+m+'</div>';
      if(r){
        h+='<div class="ms fl">'+
           (r.photo?'<img src="'+r.photo+'" style="width:100%;height:48px;object-fit:cover;border-radius:6px;margin-bottom:4px">':'')+
           '<div style="font-size:12px;font-weight:700;color:#3D2B1F;line-height:1.3">'+esc(r.title)+'</div>'+
           (r.source?'<div style="font-size:10px;color:#C4622D;margin-top:2px">'+esc(dom(r.source))+'</div>':'')+
           '<button data-rm="'+esc(d)+'|'+esc(m)+'" style="font-size:11px;color:#B0A090;background:none;border:none;cursor:pointer;padding:0;margin-top:3px;font-family:inherit">x quitar</button>'+
           '</div>';
      }else{
        h+='<div class="ms" data-pk="'+esc(d)+'|'+esc(m)+'"><div style="font-size:12px;color:#C0A8A0;text-align:center">+ agregar</div></div>';
      }
      h+='</div>';
    });
    h+='</div></div>';
  });
  if(mc>0)h+='<button class="btp" id="gs" style="margin-top:4px">'+(state.sloading?'Generando con IA...':'&#128722; Generar lista ('+mc+' comidas)')+'</button>';
  return h+'<div style="height:16px"></div>';
}
function renderShopping(){
  if(!state.shopping||!state.shopping.length)return'<div class="emp"><div style="font-size:52px">&#128722;</div><div style="font-size:14px;color:#5A4030;font-weight:700;margin:10px 0 5px">Sin lista de compras</div><div style="font-size:13px">Arm\u00e1 el men\u00fa y toc\u00e1 Generar lista</div></div>';
  var ti=0;state.shopping.forEach(function(c){ti+=(c.items||[]).length;});
  var tc=0;Object.values(state.checked||{}).forEach(function(v){if(v)tc++;});
  var pct=ti>0?Math.round(tc/ti*100):0;
  var txt='Lista de compras Goals GlutenFree\n\n';
  state.shopping.forEach(function(cat){txt+=cat.category+':\n';(cat.items||[]).forEach(function(i){txt+='- '+i+'\n';});txt+='\n';});
  var waUrl='https://wa.me/?text='+encodeURIComponent(txt);
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px">'+
      '<p style="font-size:13px;color:#5A4030"><b style="color:#C4622D">'+tc+'</b> de <b>'+ti+'</b> tachados</p>'+

    '<p id="umsg" style="font-size:12px;margin-top:7px;display:none"></p></div>'+
    recipeFields()+
    '<button class="btp" id="svr">Guardar Receta</button></div>';
  document.getElementById('cmr').onclick=function(){o.remove();};
  document.getElementById('aurl').onclick=analyzeUrl;
  document.getElementById('svr').onclick=saveReceta;
  bindPhotoPreview();
}

function modalEditReceta(rid){
  var r=(state.recipes||[]).find(function(x){return x.id===rid;});
  if(!r)return;
  var o=mkOverlay('mer');
  o.innerHTML='<div class="mod">'+
    '<div class="mh"><span style="font-size:17px;font-weight:700;color:#3D2B1F">Editar Receta &#9998;</span><button class="xb" id="cmer">x</button></div>'+
    recipeFields(r)+
    '<button class="btp" id="sver">Guardar cambios</button></div>';
  document.getElementById('cmer').onclick=function(){o.remove();};
  document.getElementById('sver').onclick=function(){
    var data=getRecipeFormData(r.photo);
    if(!data.title)return;
    var updated=Object.assign({},r,data);
    var next=(state.recipes||[]).map(function(x){return x.id===rid?updated:x;});
    state.recipes=next;save('recipes',next);o.remove();render();
  };
  bindPhotoPreview();
}

function modalLugar(existing){
  existing=existing||{};
  var isEdit=!!(existing.id);
  var o=mkOverlay(isEdit?'melg':'mlg');
  var ptOpts='';PTYPES.forEach(function(t){ptOpts+='<option value="'+t+'"'+(existing.type===t?' selected':'')+'>'+pname(t)+'</option>';});
  o.innerHTML='<div class="mod">'+
    '<div class="mh"><span style="font-size:17px;font-weight:700;color:#3D2B1F">'+(isEdit?'Editar Lugar &#9998;':'Nuevo Lugar')+'</span><button class="xb" id="cml">x</button></div>'+
    '<div style="margin-bottom:13px"><label class="lbl">Nombre *</label><input id="pn" value="'+esc(existing.name||'')+'" placeholder="Ej: La Fabrica Gluten Free"></div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:13px">'+
    '<div><label class="lbl">Barrio / Ciudad</label><input id="pne" value="'+esc(existing.neighborhood||'')+'" placeholder="Palermo"></div>'+
    '<div><label class="lbl">Tipo</label><select id="pt">'+ptOpts+'</select></div></div>'+
    '<div style="margin-bottom:13px"><label class="lbl">Puntuaci\u00f3n: <span id="sd">'+stars(existing.rating||4)+'</span></label>'+
    '<input type="range" id="pr" min="1" max="5" step="1" value="'+(existing.rating||4)+'" style="width:100%;accent-color:#C4622D"></div>'+
    '<div style="margin-bottom:13px"><label class="lbl">Foto (opcional)</label>'+
    (existing.photo?'<img src="'+existing.photo+'" style="width:100%;max-height:130px;object-fit:cover;border-radius:8px;margin-bottom:7px" id="pphoto-preview">':'<div id="pphoto-preview" style="display:none"></div>')+
    '<input type="file" id="pphoto" accept="image/*" style="font-size:13px"></div>'+
    '<div style="margin-bottom:16px"><label class="lbl">Notas</label><textarea id="pno" style="height:75px">'+esc(existing.notes||'')+'</textarea></div>'+
    '<button class="'+(isEdit?'btp':'btg')+'" id="svp">'+(isEdit?'Guardar cambios':'Guardar Lugar')+'</button></div>';
  document.getElementById('cml').onclick=function(){o.remove();};
  document.getElementById('pr').oninput=function(){document.getElementById('sd').innerHTML=stars(parseInt(this.value));};
  var pp=document.getElementById('pphoto');
  if(pp)pp.onchange=function(){
    if(!pp.files||!pp.files[0])return;
    resizeImage(pp.files[0],500,function(b64){
      var prev=document.getElementById('pphoto-preview');
      if(prev){prev.src=b64;prev.style.display='block';}
      pp.dataset.b64=b64;
    });
  };
  document.getElementById('svp').onclick=function(){
    var n=document.getElementById('pn').value.trim();if(!n)return;
    var pp2=document.getElementById('pphoto');
    var p=Object.assign({},existing,{
      id:existing.id||Date.now(),name:n,
      neighborhood:document.getElementById('pne').value,
      type:document.getElementById('pt').value,
      notes:document.getElementById('pno').value,
      rating:parseInt(document.getElementById('pr').value),
      photo:pp2&&pp2.dataset.b64?pp2.dataset.b64:(existing.photo||'')
    });
    var next=isEdit?(state.places||[]).map(function(x){return x.id===p.id?p:x;}):([p].concat(state.places||[]));
    state.places=next;save('places',next);o.remove();render();
  };
}

function modalPicker(day,meal){
  state.pk={day:day,meal:meal};state.pks='';
  var o=mkOverlay('mpk');
  function items(){
    var pks=state.pks||'';
    var fl=(state.recipes||[]).filter(function(r){return r.title&&r.title.toLowerCase().indexOf(pks.toLowerCase())>=0;});
    if(!state.recipes||!state.recipes.length)return'<p style="text-align:center;color:#8A7A6A;font-size:13px;padding:20px">Agrega recetas primero.</p>';
    return fl.map(function(r){
      var pre=r.ingredients?r.ingredients.split('\n').slice(0,2).join(', ')+(r.ingredients.split('\n').length>2?'...':''):'';
      return'<div class="pi" data-sel="'+r.id+'">'+
             (r.photo?'<img src="'+r.photo+'" style="width:100%;height:70px;object-fit:cover;border-radius:7px;margin-bottom:7px">':'')+
             '<div style="font-size:14px;font-weight:700;color:#3D2B1F">'+esc(r.title)+'</div>'+
             (r.category?'<span style="background:#FAEADA;color:#C4622D;font-size:10px;padding:1px 7px;border-radius:12px;font-weight:700">'+esc(r.category)+'</span>':'')+
             (r.source?'<div style="font-size:11px;color:#C4622D;margin-top:2px">'+esc(dom(r.source))+'</div>':'')+
             (pre?'<div style="font-size:12px;color:#8A7A6A;margin-top:2px">'+esc(pre)+'</div>':'')+
             '</div>';
    }).join('');
  }
  o.innerHTML='<div class="mod" style="max-height:82vh">'+
    '<div class="mh"><div><div style="font-size:15px;font-weight:700;color:#3D2B1F">'+dname(day)+' / '+meal+'</div>'+
    '<div style="font-size:11px;color:#8A7A6A;margin-top:2px">Eleg\u00ed una receta</div></div><button class="xb" id="cpk">x</button></div>'+
    '<input id="pks" placeholder="Buscar..." style="margin-bottom:11px">'+
    '<div id="pklist" style="overflow-y:auto;max-height:55vh">'+items()+'</div></div>';
  document.getElementById('cpk').onclick=function(){o.remove();};
  document.getElementById('pks').oninput=function(){state.pks=this.value;document.getElementById('pklist').innerHTML=items();bindPicker();};
  bindPicker();
  function bindPicker(){
    document.querySelectorAll('[data-sel]').forEach(function(el){
      el.onclick=function(){
        var r=(state.recipes||[]).find(function(x){return x.id===parseInt(el.dataset.sel);});
        if(r&&state.pk){
          if(!state.week[state.pk.day])state.week[state.pk.day]={};
          state.week[state.pk.day][state.pk.meal]=r;
          save('week',state.week);o.remove();render();
        }
      };
    });
  }
}

function setUmsg(msg){
  var el=document.getElementById('umsg');if(!el)return;
  el.style.display=msg?'block':'none';
  el.style.color=msg&&msg.indexOf('OK')>=0?'#4A7A3A':'#C4622D';
  el.textContent=msg;
}

function analyzeUrl(){
  var urlEl=document.getElementById('rurl');
  var url=urlEl&&urlEl.value?urlEl.value.trim():'';if(!url)return;
  if(!LS.get('apikey')){setUmsg('Configura tu API key en IA');return;}
  setUmsg('Buscando la receta...');
  var btn=document.getElementById('aurl');if(btn)btn.disabled=true;
  aiCall([{role:'user',content:'Extrae la receta de: "'+url+'". SOLO JSON valido sin markdown: {"title":"nombre","ingredients":"- item1\\n- item2","notes":"preparacion breve","source":"'+url+'"}'}],
    'Extraes recetas sin TACC. SOLO JSON valido.',true)
  .then(function(t){
    var c=t.replace(/```[\w]*/g,'').replace(/```/g,'').trim();
    state._rf=JSON.parse(c.slice(c.indexOf('{'),c.lastIndexOf('}')+1));
    var rt=document.getElementById('rt');if(rt)rt.value=state._rf.title||'';
    var ri=document.getElementById('ri');if(ri)ri.value=state._rf.ingredients||'';
    var rn=document.getElementById('rn');if(rn)rn.value=state._rf.notes||'';
    var rsrc=document.getElementById('rsrc');if(rsrc)rsrc.value=state._rf.source||'';
    if(urlEl)urlEl.value='';setUmsg('OK Receta extraida! Revisa y guarda.');
  }).catch(function(e){setUmsg(e.message==='nokey'?'Configura tu API key en IA':'No pude extraer. Completa a mano.');
  }).then(function(){var b=document.getElementById('aurl');if(b)b.disabled=false;});
}

function saveReceta(){
  var data=getRecipeFormData('');if(!data.title)return;
  var rec=Object.assign({id:Date.now(),createdAt:new Date().toLocaleDateString('es-AR')},data);
  var next=[rec].concat(state.recipes||[]);state.recipes=next;save('recipes',next);
  state._rf=null;var mr=document.getElementById('mr');if(mr)mr.remove();render();
}

function genShopping(){
  if(state.sloading)return;
  if(!LS.get('apikey')){alert('Configura tu API key en la pestana IA');return;}
  state.sloading=true;render();
  var all=[];DAYS.forEach(function(d){MEALS.forEach(function(m){if(state.week&&state.week[d]&&state.week[d][m])all.push(state.week[d][m]);});});
  var rd=all.map(function(r){return '- '+r.title+': '+(r.ingredients||'sin ingredientes');}).join('\n');
  aiCall([{role:'user',content:'Menu sin TACC:\n'+rd+'\n\nLista de compras consolidada. SOLO JSON array sin markdown:\n[{"category":"Verduras","items":["Papa 1kg"]},{"category":"Harinas sin TACC","items":["Harina de arroz 500g"]},{"category":"Proteinas","items":["Pollo 1kg"]},{"category":"Lacteos","items":["Leche 1L"]},{"category":"Otros","items":["Aceite"]}]\nConsolida ingredientes repetidos.'}],
    'Nutricionista experto en celiaqui\u00eda argentina. SOLO JSON array valido.')
  .then(function(t){
    var c=t.replace(/```[\w]*/g,'').replace(/```/g,'').trim();
    state.shopping=JSON.parse(c.slice(c.indexOf('['),c.lastIndexOf(']')+1));
    state.checked={};save('shopping',state.shopping);save('checked',{});state.mv='shopping';
  }).catch(function(e){alert('Error al generar lista. Revisa tu API key.');
  }).then(function(){state.sloading=false;render();});
}

function buscarRecos(){
  if(state.rloading)return;
  var rzEl=document.getElementById('rz');var z=rzEl&&rzEl.value?rzEl.value.trim():'';if(!z)return;
  if(!LS.get('apikey')){alert('Configura tu API key en la pestana IA');return;}
  state.rz=z;state.rloading=true;state.recos=[];render();
  aiCall([{role:'user',content:'Lugares reales sin TACC en: '+z+', Argentina. SOLO JSON array sin markdown:\n[{"name":"Nombre","type":"Restaurante","address":"barrio","description":"que ofrecen sin TACC","mapsQuery":"Nombre '+z+' Argentina"}]\n5-8 lugares conocidos.'}],
    'Experto en gastronomia sin TACC Argentina. SOLO JSON array valido.',true)
  .then(function(t){
    var c=t.replace(/```[\w]*/g,'').replace(/```/g,'').trim();
    state.recos=JSON.parse(c.slice(c.indexOf('['),c.lastIndexOf(']')+1));
  }).catch(function(e){state.recos=[];
  }).then(function(){state.rloading=false;render();});
}

function sendChat(txt){
  if(!txt||!txt.trim()||state.cloading)return;
  var ci=document.getElementById('ci');if(ci)ci.value='';
  var next=(state.chatMsgs||[]).concat([{role:'user',content:txt}]);
  state.chatMsgs=next;save('chat',next);state.cloading=true;render();
  aiCall(next.slice(-12),'Sos asistente experta en celiaquia en Argentina. Espanol rioplatense, amigable, concisa (max 4 oraciones). Sabes sobre TACC, contaminacion cruzada, marcas argentinas aptas. Usas emojis ocasionalmente.')
  .then(function(rep){
    var fin=next.concat([{role:'assistant',content:rep}]);state.chatMsgs=fin;save('chat',fin);
  }).catch(function(e){
    var msg=e.message==='nokey'?'Configura tu API key arriba':'Error de conexion. Intenta de nuevo';
    state.chatMsgs=next.concat([{role:'assistant',content:msg}]);save('chat',state.chatMsgs);
  }).then(function(){state.cloading=false;render();});
}

function doScan(){
  if(!state.scanImg)return;
  if(!LS.get('apikey')){alert('Configura tu API key en la pestana IA');return;}
  state.scanLoading=true;state.scanResult=null;state.scanStep='step1';state.scanProd=null;render();
  var b64=state.scanImg.split(',')[1];
  var mime=state.scanMime||'image/jpeg';
  doScanSteps(b64,mime,function(step,prod){
    state.scanStep=step;
    if(prod)state.scanProd=prod;
    render();
  })
  .then(function(r){state.scanResult=r;})
  .catch(function(e){state.scanResult=e.message==='nokey'?'Configura tu API key en la pestana IA':'Error al analizar. Intenta de nuevo: '+e.message;})
  .then(function(){state.scanLoading=false;render();});
}

function bind(){
  document.querySelectorAll('[data-t]').forEach(function(b){b.onclick=function(){state.tab=b.dataset.t;render();};});
  var vp=document.getElementById('vp');if(vp)vp.onclick=function(){state.mv='planner';render();};
  var vs=document.getElementById('vs');if(vs)vs.onclick=function(){state.mv='shopping';render();};
  var gs=document.getElementById('gs');if(gs)gs.onclick=genShopping;
  var rc=document.getElementById('rc');if(rc)rc.onclick=function(){state.checked={};save('checked',{});render();};
  document.querySelectorAll('[data-pk]').forEach(function(el){el.onclick=function(){var p=el.dataset.pk.split('|');modalPicker(p[0],p[1]);};});
  document.querySelectorAll('[data-rm]').forEach(function(el){el.onclick=function(e){e.stopPropagation();var p=el.dataset.rm.split('|');if(state.week&&state.week[p[0]])state.week[p[0]][p[1]]=null;save('week',state.week);render();};});
  document.querySelectorAll('[data-ck]').forEach(function(el){el.onclick=function(){var k=el.dataset.ck;var n=Object.assign({},state.checked);n[k]=!n[k];state.checked=n;save('checked',n);render();};});
  document.querySelectorAll('[data-cat]').forEach(function(el){el.onclick=function(){state.rcat=el.dataset.cat;render();};});
  var rsEl=document.getElementById('rsrch');if(rsEl)rsEl.oninput=function(){state.rs=this.value;render();};
  document.querySelectorAll('[data-tr]').forEach(function(el){el.onclick=function(){var id=parseInt(el.dataset.tr);state.er=state.er===id?null:id;render();};});
  document.querySelectorAll('[data-er]').forEach(function(el){el.onclick=function(e){e.stopPropagation();modalEditReceta(parseInt(el.dataset.er));};});
  document.querySelectorAll('[data-dr]').forEach(function(el){el.onclick=function(e){e.stopPropagation();if(confirm('Borrar esta receta?')){state.recipes=(state.recipes||[]).filter(function(r){return r.id!==parseInt(el.dataset.dr);});save('recipes',state.recipes);render();}};});
  var nar=document.getElementById('nar');if(nar)nar.onclick=modalReceta;
  var psEl=document.getElementById('psrch');if(psEl)psEl.oninput=function(){state.ps=this.value;render();};
  document.querySelectorAll('[data-tm]').forEach(function(el){el.onclick=function(){var id=parseInt(el.dataset.tm);state.ep=state.ep===id?null:id;render();};});
  document.querySelectorAll('[data-elg]').forEach(function(el){el.onclick=function(){var p=(state.places||[]).find(function(x){return x.id===parseInt(el.dataset.elg);});if(p)modalLugar(p);};});
  document.querySelectorAll('[data-dp]').forEach(function(el){el.onclick=function(){if(confirm('Borrar este lugar?')){state.places=(state.places||[]).filter(function(p){return p.id!==parseInt(el.dataset.dp);});save('places',state.places);render();}};});
  document.querySelectorAll('[data-om]').forEach(function(el){el.onclick=function(){omaps(el.dataset.om);};});
  var nap=document.getElementById('nap');if(nap)nap.onclick=function(){modalLugar({});};
  var rzEl=document.getElementById('rz');if(rzEl){rzEl.oninput=function(){state.rz=this.value;};rzEl.onkeydown=function(e){if(e.key==='Enter')buscarRecos();};}
  var sr=document.getElementById('sr');if(sr)sr.onclick=buscarRecos;
  document.querySelectorAll('[data-tri]').forEach(function(el){el.onclick=function(){var i=parseInt(el.dataset.tri);state.smf=state.smf===i?null:i;render();};});
  document.querySelectorAll('[data-sri]').forEach(function(el){el.onclick=function(){var r=(state.recos||[])[parseInt(el.dataset.sri)];if(r){var p={id:Date.now(),name:r.name,neighborhood:r.address,type:r.type||'Restaurante',notes:r.description||'',rating:4,photo:''};state.places=[p].concat(state.places||[]);save('places',state.places);el.textContent='Guardado';el.disabled=true;}};});
  var scanInput=document.getElementById('scanInput');
  if(scanInput)scanInput.onchange=function(){
    if(!scanInput.files||!scanInput.files[0])return;
    var mime=scanInput.files[0].type||'image/jpeg';
    resizeImage(scanInput.files[0],800,function(b64){state.scanImg=b64;state.scanMime=mime;state.scanResult=null;state.scanLoading=false;render();});
  };
  var ds=document.getElementById('doScan');if(ds)ds.onclick=doScan;
  var cs=document.getElementById('clearScan');if(cs)cs.onclick=function(){state.scanImg=null;state.scanResult=null;state.scanLoading=false;render();};
  var sak=document.getElementById('sak');if(sak)sak.onclick=function(){var ki=document.getElementById('aki');if(ki&&ki.value.trim()){LS.set('apikey',ki.value.trim());render();}};
  var ssv=document.getElementById('ssv');if(ssv)ssv.onclick=function(){var si=document.getElementById('sui');if(si&&si.value&&si.value.indexOf('script.google.com')>=0){sheetUrl=si.value.trim();LS.set('sheetUrl',sheetUrl);sheetSync();render();}else{alert('Ingresa una URL valida de Google Apps Script');}};
  var sdc=document.getElementById('sdc');if(sdc)sdc.onclick=function(){sheetUrl='';LS.set('sheetUrl','');render();};
  var ci=document.getElementById('ci'),csnd=document.getElementById('csnd');
  if(csnd)csnd.onclick=function(){if(ci)sendChat(ci.value);};
  if(ci)ci.onkeydown=function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat(ci.value);}};
  document.querySelectorAll('[data-qq]').forEach(function(el,i){el.onclick=function(){sendChat(QQ[i]);};});
}

render();
if(sheetUrl)sheetSync();
</script>
</body>
</html>
